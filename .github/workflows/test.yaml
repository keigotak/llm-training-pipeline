name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install basic dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest
          pip install torch datasets tiktoken tqdm

      - name: Format check
        run: black --check .

      - name: Lint
        run: ruff check .

      - name: Syntax check
        run: |
          python -m py_compile train.py
          python -m py_compile sft.py
          python -m py_compile dpo.py
          python -m py_compile reward_model.py
          python -m py_compile ppo.py
          python -m py_compile grpo.py
          python -m py_compile multimodal_train.py
          python -m py_compile generate_sample_data.py
          python -m py_compile generate_grpo_data.py

      - name: Unit tests
        run: pytest -q

      - name: Stage smoke examples
        run: |
          bash examples/pretrain_smoke.sh
          bash examples/sft_smoke.sh
          bash examples/dpo_smoke.sh
          bash examples/reward_model_smoke.sh
          bash examples/ppo_smoke.sh
          bash examples/grpo_smoke.sh
